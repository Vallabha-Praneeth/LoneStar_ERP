name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# Cancel any in-progress run when a newer commit lands on the same PR/branch.
# Saves CI minutes on rapid-fire pushes.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests across N parallel shards. Each shard gets its own runner,
  # own build, and writes a blob report that a downstream job merges.
  test:
    name: Shard ${{ matrix.shard }}/${{ strategy.job-total }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/e2e-web/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install E2E dependencies
        working-directory: tests/e2e-web
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: tests/e2e-web
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (cold cache)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e-web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (warm cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests/e2e-web
        run: npx playwright install-deps chromium

      - name: Run Playwright tests (shard ${{ matrix.shard }}/2)
        working-directory: tests/e2e-web
        env:
          CI: true
          BASE_URL: http://localhost:4173
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_CLIENT_EMAIL: ${{ secrets.TEST_CLIENT_EMAIL }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
          TEST_DRIVER_USERNAME: ${{ secrets.TEST_DRIVER_USERNAME }}
          TEST_DRIVER_PASSWORD: ${{ secrets.TEST_DRIVER_PASSWORD }}
          TEST_CAMPAIGN_ID: ${{ secrets.TEST_CAMPAIGN_ID }}
        run: npx playwright test --shard=${{ matrix.shard }}/2 --reporter=blob

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: tests/e2e-web/blob-report
          retention-days: 1

  # Merge the blob reports from each shard into one HTML + JUnit report.
  # Runs even if some shards failed so the merged HTML surfaces all failures.
  merge-reports:
    name: Merge reports
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e-web/package-lock.json

      - name: Install E2E dependencies
        working-directory: tests/e2e-web
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: tests/e2e-web/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge blobs into HTML + JUnit
        working-directory: tests/e2e-web
        run: npx playwright merge-reports --config=playwright.config.ts ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e-web/playwright-report
          retention-days: 14

      - name: Upload merged JUnit results
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: tests/e2e-web/results/junit.xml
          retention-days: 14
