version: 2
updates:
  # App dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      supabase:
        patterns: ["@supabase/*"]
      radix-ui:
        patterns: ["@radix-ui/*"]
      tanstack:
        patterns: ["@tanstack/*"]
      vite-ecosystem:
        patterns: ["vite", "@vitejs/*", "typescript", "eslint*", "typescript-eslint"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
